{% from "partials/_icons.html" import icon %}
<section id="officeHoursCard" class="dashboard-card">
    <div class="flex items-start justify-between gap-4">
        <div>
            <p class="section-kicker">Suporte coletivo</p>
            <h4 class="icon-title">{{ icon('calendar', 'h-5 w-5') }}<span>Plantão Tira-Dúvidas</span></h4>
        </div>
        <span class="tag">Canal aberto</span>
    </div>
    <div id="officeHoursForm" class="action-panel is-hidden">
        <p class="field-hint">Abra um plantão ao vivo para toda a base de alunos com data, contexto e link de acesso.</p>
        <div class="input-stack">
            <input type="text" id="officeHoursTitle" placeholder="Título do plantão">
            <textarea id="officeHoursDescription" placeholder="O que será atendido neste plantão?"></textarea>
            <input type="datetime-local" id="officeHoursDate">
            <input type="url" id="officeHoursLink" placeholder="https://...">
            <button id="createOfficeHoursButton" type="button" class="btn-success">Iniciar plantão</button>
        </div>
    </div>
    <div id="officeHoursList" class="list-container">Carregando plantões...</div>
</section>
