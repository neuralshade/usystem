{% from "partials/_icons.html" import icon %}
<aside id="chatCard" class="chat-widget is-hidden">
    <button id="chatLauncher" type="button" class="chat-launcher" aria-controls="chatPanel" aria-expanded="false">
        <span class="chat-launcher-edge" aria-hidden="true"></span>
        <span class="chat-launcher-label">{{ icon('message-circle') }}</span>
        <span id="chatLauncherBadge" class="chat-badge chat-launcher-badge is-hidden">0</span>
    </button>

    <section id="chatPanel" class="chat-panel" aria-hidden="true">
        <div class="chat-card-header">
            <div class="chat-card-header-left">
                <button id="chatCollapseButton" type="button" class="chat-collapse-button" aria-label="Esconder chat">
                    {{ icon('x') }}
                </button>
                <span id="chatStatus" class="is-hidden">Carregando conversa...</span>
            </div>
            <div class="chat-card-header-right">
                <span id="chatUnreadBadge" class="chat-badge is-hidden">0 novas</span>
                <span class="chat-header-label">CHAT</span>
            </div>
        </div>
        <div id="chatMessages" class="chat-thread">
            <p class="list-empty">Carregando mensagens...</p>
        </div>
        <div id="chatComposer" class="chat-composer">
            <textarea id="chatMessageInput" placeholder="Escreva uma mensagem para este canal"></textarea>
            <div class="chat-compose-actions">
                <button id="sendChatMessageButton" type="button" class="btn-success btn-inline">
                    {{ icon('send') }}
                </button>
            </div>
        </div>
    </section>
</aside>
