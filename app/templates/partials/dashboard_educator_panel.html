{% from "partials/_icons.html" import icon %}
<section id="educatorPanel" class="dashboard-card dashboard-card-wide is-hidden">
    <div class="dashboard-header">
        <div>
            <p class="section-kicker">Gestao de carteira</p>
            <h4 class="icon-title">{{ icon('users', 'h-5 w-5') }}<span>Meus Alunos</span></h4>
            <p class="field-hint">Clique em um aluno para abrir a página da associação.</p>

        </a>

    <div id="managedStudentsTable" class="list-container">Carregando alunos vinculados...</div>
