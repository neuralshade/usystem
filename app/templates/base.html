<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}USystem{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    {% block extra_head %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <div class="site-shell">
        {% block topbar %}
        <header class="app-topbar">
            <div class="app-topbar-inner">
                <a class="app-topbar-brand" href="/dashboard">US.</a>
                <nav class="app-topbar-nav" aria-label="Principal">
                    <a class="app-topbar-link" href="/dashboard">Dashboard</a>
                    <a class="app-topbar-link" href="/students/available">Directory</a>
                </nav>
            </div>
        </header>
        {% endblock %}

        <div class="{% block page_shell_class %}app-shell{% endblock %}">
            <div class="{% block page_container_class %}page-container{% endblock %}">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    {% block scripts %}{% endblock %}
</body>

</html>
