{% extends "base.html" %}
{% block content %}
<style>
    :root { --primary: #4a90e2; --secondary: #f39c12; --success: #27ae60; --dark: #2c3e50; }
    .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); }
    .card h3 { color: var(--dark); border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 0; }
    .btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
    .btn-alt { background: var(--success); }
    .badge { background: #e1f5fe; color: #01579b; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
    .item-card { border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 10px; background: #fafafa; }
    input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
</style>

<div class="dashboard-container">
    <div class="header-box">
        <div>
            <h1>Olá, <span id="userName">Usuário</span>!</h1>
            <p id="userRoleBadge" class="badge">Carregando perfil...</p>
        </div>
        <button class="btn" style="width: auto; background: #e74c3c;" onclick="logout()">Sair</button>
    </div>

    <div id="dynamicSections" class="grid">
        </div>
</div>

<script>
    const role = localStorage.getItem('role');
    const token = localStorage.getItem('token');
    const name = localStorage.getItem('name');

    if (!token) window.location.href = '/login';

    document.getElementById('userName').innerText = name;
    document.getElementById('userRoleBadge').innerText = role.toUpperCase();

    async function fetchAPI(endpoint, method = 'GET', body = null) {
        const options = {
            method,
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
        };
        if (body) options.body = JSON.stringify(body);
        return fetch(endpoint, options);
    }

    async function loadDashboard() {
        const sections = document.getElementById('dynamicSections');
        sections.innerHTML = '';

        // 1. SEÇÃO DE AULAS (Comum a todos, mas com funções diferentes)
        let classesHtml = `
            <div class="card">
                <h3>📚 Aulas Disponíveis</h3>
                ${role === 'teacher' ? `
                    <input type="text" id="classTitle" placeholder="Título da Aula">
                    <input type="datetime-local" id="classDate">
                    <input type="url" id="classLink" placeholder="Link da Transmissão">
                    <button class="btn" onclick="createClass()">Agendar Nova Aula</button>
                    <hr>` : ''}
                <div id="classList">Carregando aulas...</div>
            </div>`;

        // 2. SEÇÃO DE MENTORIA (Específico para Mentor e Aluno)
        let mentorHtml = '';
        if (role === 'mentor') {
            mentorHtml = `
                <div class="card">
                    <h3>🎓 Alunos sob minha Mentoria</h3>
                    <div id="myStudentsList">Buscando alunos...</div>
                </div>
                <div class="card">
                    <h3>📅 Agendar Reunião Individual</h3>
                    <input type="number" id="meetStudentId" placeholder="ID do Aluno">
                    <input type="text" id="meetDesc" placeholder="Objetivo da Reunião">
                    <input type="datetime-local" id="meetDate">
                    <input type="url" id="meetLink" placeholder="Link do Zoom/Meet">
                    <button class="btn btn-alt" onclick="createMeeting()">Confirmar Agendamento</button>
                </div>`;
        } else if (role === 'student') {
            mentorHtml = `
                <div class="card">
                    <h3>🤝 Minhas Mentorias</h3>
                    <div id="meetingList">Carregando reuniões...</div>
                </div>`;
        }

        // 3. SEÇÃO DE ARQUIVOS
        let filesHtml = `
            <div class="card">
                <h3>📂 Materiais de Apoio</h3>
                <input type="file" id="fileInput">
                <button class="btn" onclick="uploadFile()">Enviar Documento</button>
                <div id="fileList" style="margin-top:15px;"></div>
            </div>`;

        sections.innerHTML = classesHtml + mentorHtml + filesHtml;

        // Carregar dados das APIs
        loadClasses();
        if (role === 'mentor') loadMyStudents();
        if (role === 'student' || role === 'mentor') loadMeetings();
        loadFiles();
    }

    async function loadClasses() {
        const res = await fetchAPI('/api/classes');
        const data = await res.json();
        const list = document.getElementById('classList');
        list.innerHTML = data.map(c => `
            <div class="item-card">
                <strong>${c.title}</strong><br>
                <small>Professor: ${c.teacher_name}</small><br>
                <small>📅 ${new Date(c.datetime).toLocaleString()}</small><br>
                <a href="${c.link}" target="_blank" style="color:var(--primary); font-size: 0.9em;">Link da Aula 🔗</a>
            </div>
        `).join('') || 'Nenhuma aula agendada.';
    }

    async function loadMyStudents() {
        const res = await fetchAPI('/api/my-students');
        const data = await res.json();
        const list = document.getElementById('myStudentsList');
        list.innerHTML = data.map(s => `
            <div class="item-card" style="border-left: 4px solid var(--success);">
                <strong>${s.name}</strong><br>
                <small>ID: ${s.id} | ${s.email}</small>
                <button class="btn" style="padding:5px; font-size:11px;" onclick="document.getElementById('meetStudentId').value=${s.id}">Selecionar para Reunião</button>
            </div>
        `).join('') || 'Você ainda não possui alunos vinculados.';
    }

    async function loadMeetings() {
        const res = await fetchAPI('/api/meetings');
        const data = await res.json();
        const list = document.getElementById('meetingList');
        if(!list) return;
        list.innerHTML = data.map(m => `
            <div class="item-card">
                <strong>Reunião: ${m.description}</strong><br>
                <small>Data: ${new Date(m.datetime).toLocaleString()}</small><br>
                <a href="${m.link}" target="_blank">Entrar na Sala 🎥</a>
            </div>
        `).join('') || 'Sem reuniões marcadas.';
    }

    async function loadFiles() {
        const res = await fetchAPI('/api/files');
        const data = await res.json();
        const list = document.getElementById('fileList');
        list.innerHTML = data.map(f => `
            <div style="margin-bottom:5px;">📄 <a href="/api/files/download/${f.id}">${f.filename}</a></div>
        `).join('');
    }

    // Funções de criação (Simplificadas)
    async function createClass() {
        const body = {
            title: document.getElementById('classTitle').value,
            datetime: document.getElementById('classDate').value,
            link: document.getElementById('classLink').value
        };
        await fetchAPI('/api/classes', 'POST', body);
        loadClasses();
    }

    async function createMeeting() {
        const body = {
            student_id: document.getElementById('meetStudentId').value,
            description: document.getElementById('meetDesc').value,
            datetime: document.getElementById('meetDate').value,
            link: document.getElementById('meetLink').value
        };
        await fetchAPI('/api/meetings', 'POST', body);
        alert('Reunião agendada!');
        if(role === 'mentor') loadMeetings();
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/login';
    }

    loadDashboard();
</script>
{% endblock %}
