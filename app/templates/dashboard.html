{% extends "base.html" %}

{% block content %}
<div class="dashboard-container">
    <header class="dashboard-header">
        <div>
            <h1>Painel de Controle</h1>
            <p>Bem-vindo, <span id="userName" style="font-weight: bold; color: var(--primary);">...</span> (<span id="userRole">...</span>)</p>
        </div>
        <button class="btn btn-alt" onclick="logout()">Sair</button>
    </header>

    <div id="dashboardContent" class="dashboard-grid">
        </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    const name = localStorage.getItem('name');

    // Correção do erro no Login: Redirecionar para a raiz '/' se não houver token
    if (!token) {
        window.location.href = '/';
    }

    document.getElementById('userName').innerText = name;
    document.getElementById('userRole').innerText = role === 'mentor' ? 'Mentor/Professor' : (role === 'teacher' ? 'Professor/Mentor' : 'Aluno');

    function logout() {
        localStorage.clear();
        window.location.href = '/'; // Correção do redirecionamento
    }

    async function fetchAPI(url, method = 'GET', body = null) {
        const options = {
            method,
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        };
        if (body) options.body = JSON.stringify(body);
        return await fetch(url, options);
    }

    // Unificação de Mentor e Professor na Interface
    function loadDashboard() {
        const container = document.getElementById('dashboardContent');
        let html = '';

        // Seção de Aulas (Comum a Professor/Mentor)
        let classesHtml = `
            <div class="card">
                <h3>📚 Aulas Disponíveis</h3>
                ${(role === 'teacher' || role === 'mentor') ? `
                    <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;">
                        <input type="text" id="classTitle" placeholder="Título da Aula">
                        <input type="datetime-local" id="classDate">
                        <input type="url" id="classLink" placeholder="Link da Transmissão (Zoom/YouTube)">
                        <button class="btn" onclick="createClass()">Agendar Nova Aula</button>
                    </div>
                    <hr>` : ''}
                <div id="classList">Carregando aulas...</div>
            </div>`;

        // Seção de Alunos e Reuniões (Unificada)
        let mentorHtml = '';
        if (role === 'mentor' || role === 'teacher') {
            mentorHtml = `
                <div class="card">
                    <h3>🎓 Meus Alunos</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <input type="number" id="newStudentId" placeholder="ID do Aluno" style="width: 100px;">
                        <button class="btn" style="background: var(--success); flex: 1;" onclick="addStudent()">Vincular Aluno à minha Lista</button>
                    </div>
                    <hr>
                    <div id="myStudentsList">Buscando alunos...</div>
                </div>
                <div class="card">
                    <h3>📅 Agendar Reunião</h3>
                    <input type="number" id="meetStudentId" placeholder="ID do Aluno">
                    <input type="text" id="meetDesc" placeholder="Objetivo da Reunião">
                    <input type="datetime-local" id="meetDate">
                    <input type="url" id="meetLink" placeholder="Link (Zoom/Meet)">
                    <button class="btn btn-alt" onclick="createMeeting()">Confirmar Agendamento</button>
                </div>`;
        } else {
            mentorHtml = `
                <div class="card">
                    <h3>🤝 Minhas Reuniões</h3>
                    <div id="meetingList">Carregando reuniões...</div>
                </div>`;
        }

        // Seção de Arquivos
        let filesHtml = `
            <div class="card">
                <h3>📁 Materiais e Arquivos</h3>
                <div style="margin-bottom: 15px;">
                    <input type="file" id="fileInput">
                    <button class="btn" onclick="uploadFile()">Enviar Arquivo</button>
                </div>
                <div id="fileList">Carregando arquivos...</div>
            </div>`;

        container.innerHTML = classesHtml + mentorHtml + filesHtml;

        // Carregar dados iniciais
        loadClasses();
        loadFiles();
        if (role === 'mentor' || role === 'teacher') {
            loadMyStudents();
            loadMeetings();
        } else {
            loadMeetings();
        }
    }

    // --- FUNÇÕES DE AÇÃO ---

    async function addStudent() {
        const studentId = document.getElementById('newStudentId').value;
        const mentorId = localStorage.getItem('id'); 
        
        if (!studentId) return alert('Informe o ID do aluno.');
        
        const res = await fetchAPI('/api/assign-mentor', 'POST', { 
            student_id: studentId, 
            mentor_id: mentorId 
        });
        
        if (res.ok) {
            alert('Aluno adicionado com sucesso!');
            document.getElementById('newStudentId').value = '';
            loadMyStudents();
        } else {
            const data = await res.json();
            alert(data.error || 'Erro ao vincular aluno.');
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) return alert('Selecione um arquivo.');

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        
        if (res.ok) {
            alert('Arquivo enviado!');
            loadFiles();
        } else {
            alert('Erro no upload.');
        }
    }

    async function loadClasses() {
        const res = await fetchAPI('/api/classes');
        const classes = await res.json();
        const list = document.getElementById('classList');
        list.innerHTML = classes.map(c => `
            <div class="item">
                <strong>${c.title}</strong><br>
                <small>${new Date(c.date).toLocaleString()}</small><br>
                <a href="${c.link}" target="_blank">Acessar Aula 🔗</a>
            </div>
        `).join('') || 'Nenhuma aula agendada.';
    }

    async function loadMyStudents() {
        const res = await fetchAPI('/api/my-students');
        const students = await res.json();
        const list = document.getElementById('myStudentsList');
        list.innerHTML = students.map(s => `
            <div class="item">
                <strong>ID: ${s.id} - ${s.name}</strong><br>
                <small>${s.email}</small>
            </div>
        `).join('') || 'Você ainda não tem alunos vinculados.';
    }

    async function loadMeetings() {
        const res = await fetchAPI('/api/meetings');
        const meetings = await res.json();
        const list = document.getElementById(role === 'student' ? 'meetingList' : 'meetingList'); // Simplificado
        // Se for professor, pode mostrar em um lugar específico ou junto
        const target = role === 'student' ? document.getElementById('meetingList') : document.getElementById('myStudentsList');
        
        let html = meetings.map(m => `
            <div class="item" style="border-left: 4px solid var(--secondary);">
                <strong>${m.description}</strong><br>
                <small>${new Date(m.date).toLocaleString()}</small><br>
                <a href="${m.link}" target="_blank">Link da Reunião 🎥</a>
            </div>
        `).join('');
        
        if(role === 'student') list.innerHTML = html || 'Nenhuma reunião marcada.';
    }

    async function loadFiles() {
        const res = await fetchAPI('/api/files');
        const files = await res.json();
        const list = document.getElementById('fileList');
        list.innerHTML = files.map(f => `
            <div class="item">
                <span>📄 ${f.filename}</span>
                <a href="/api/files/download/${f.id}" class="btn-sm">Baixar</a>
            </div>
        `).join('') || 'Nenhum arquivo disponível.';
    }

    async function createClass() {
        const title = document.getElementById('classTitle').value;
        const date = document.getElementById('classDate').value;
        const link = document.getElementById('classLink').value;
        const res = await fetchAPI('/api/classes', 'POST', { title, date, link });
        if (res.ok) loadClasses();
    }

    async function createMeeting() {
        const student_id = document.getElementById('meetStudentId').value;
        const description = document.getElementById('meetDesc').value;
        const date = document.getElementById('meetDate').value;
        const link = document.getElementById('meetLink').value;
        const res = await fetchAPI('/api/meetings', 'POST', { student_id, description, date, link });
        if (res.ok) alert('Reunião agendada!');
    }

    loadDashboard();
</script>

<style>
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .item { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
    .btn-sm { font-size: 0.8rem; padding: 4px 8px; background: var(--primary); color: white; border-radius: 4px; text-decoration: none; float: right; }
    hr { margin: 15px 0; border: 0; border-top: 1px solid #eee; }
    input { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ddd; border-radius: 4px; }
</style>
{% endblock %}
